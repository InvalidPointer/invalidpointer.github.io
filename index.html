<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>invalidpointer</title>
  <style>
    :root {
      --bg: #111214;
      --panel: #17191c;
      --panel-soft: #1f2226;
      --text: #e7e3dc;
      --muted: #aeb3bb;
      --dim: #737982;
      --line: #353a40;
      --accent: #88d1b4;
      --accent-soft: rgba(136, 209, 180, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.6;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(100%, 960px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 28px;
      display: flex;
      align-items: center;
    }

    .shell {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(23, 25, 28, 0.82);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.28);
    }

    .shell-bar {
      min-height: 42px;
      border-bottom: 1px solid var(--line);
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--dim);
      font-size: 0.78rem;
    }

    .shell-dots {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .shell-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--line);
    }

    .shell-path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shell-body {
      padding: 56px;
    }

    .prompt {
      color: var(--accent);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 3rem;
      line-height: 1.08;
      font-weight: 700;
    }

    .intro {
      max-width: 560px;
      margin: 20px 0 48px;
      color: var(--muted);
      font-size: 1rem;
    }

    .section-label {
      margin-bottom: 14px;
      color: var(--dim);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .project-list {
      display: grid;
      gap: 12px;
    }

    .project-link {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      min-height: 72px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 18px 20px;
      text-decoration: none;
      transition: border-color 0.16s ease, background-color 0.16s ease, transform 0.16s ease;
    }

    .project-link:hover,
    .project-link:focus-visible {
      border-color: var(--accent);
      background: var(--panel-soft);
      transform: translateY(-2px);
      outline: none;
    }

    .project-name {
      display: block;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
    }

    .project-note {
      display: block;
      margin-top: 4px;
      color: var(--dim);
      font-size: 0.86rem;
    }

    .project-status {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(136, 209, 180, 0.28);
      padding: 4px 8px;
      font-size: 0.78rem;
    }

    @media (max-width: 680px) {
      .page {
        padding: 24px 16px;
        align-items: stretch;
      }

      .shell-body {
        padding: 34px 22px;
      }

      h1 {
        font-size: 2.25rem;
      }

      .intro {
        margin-bottom: 36px;
      }

      .project-link {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .project-status {
        width: max-content;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell" aria-labelledby="site-title">
      <div class="shell-bar" aria-hidden="true">
        <div class="shell-dots">
          <span class="shell-dot"></span>
          <span class="shell-dot"></span>
          <span class="shell-dot"></span>
        </div>
        <div class="shell-path">~/invalidpointer.github.io</div>
      </div>

      <div class="shell-body">
        <div class="prompt">whoami</div>
        <h1 id="site-title">invalidpointer</h1>
        <p class="intro">Personal utilities and small web experiments.</p>

        <div class="section-label">projects</div>
        <div class="project-list">
          <a class="project-link" href="/shop-helper/">
            <span>
              <span class="project-name">01 / shop-helper</span>
              <span class="project-note">Shop Helper</span>
            </span>
            <span class="project-status">open</span>
          </a>
          <a class="project-link" href="/adhd-bored/">
            <span>
              <span class="project-name">02 / adhd-bored</span>
              <span class="project-note">Pressure Tiles</span>
            </span>
            <span class="project-status">open</span>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
